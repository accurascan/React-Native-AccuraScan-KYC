buildscript {
  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:7.2.1"
  }
}

def isNewArchitectureEnabled() {
  return rootProject.hasProperty("newArchEnabled") && rootProject.getProperty("newArchEnabled") == "true"
}

apply plugin: "com.android.library"


def appProject = rootProject.allprojects.find { it.plugins.hasPlugin('com.android.application') }

if (isNewArchitectureEnabled()) {
  apply plugin: "com.facebook.react"
}

def getExtOrDefault(name) {
  return rootProject.ext.has(name) ? rootProject.ext.get(name) : project.properties["AccurascanMICR_" + name]
}

def getExtOrIntegerDefault(name) {
  return rootProject.ext.has(name) ? rootProject.ext.get(name) : (project.properties["AccurascanMICR_" + name]).toInteger()
}

android {
  compileSdkVersion getExtOrIntegerDefault("compileSdkVersion")

  defaultConfig {
    minSdkVersion getExtOrIntegerDefault("minSdkVersion")
    targetSdkVersion getExtOrIntegerDefault("targetSdkVersion")
    buildConfigField "boolean", "IS_NEW_ARCHITECTURE_ENABLED", isNewArchitectureEnabled().toString()
  }
  buildTypes {
    release {
      minifyEnabled false
    }
  }

  lintOptions {
    disable "GradleCompatible"
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_1_8
    targetCompatibility JavaVersion.VERSION_1_8
  }

  packagingOptions {
      pickFirst 'lib/arm64-v8a/libcrypto.so'
      pickFirst 'lib/arm64-v8a/libssl.so'

      pickFirst 'lib/armeabi-v7a/libcrypto.so'
      pickFirst 'lib/armeabi-v7a/libssl.so'

      pickFirst 'lib/x86/libcrypto.so'
      pickFirst 'lib/x86/libssl.so'

      pickFirst 'lib/x86_64/libcrypto.so'
      pickFirst 'lib/x86_64/libssl.so'
  }
}

repositories {
  mavenCentral()
  google()
}


dependencies {
  // For < 0.71, this will be from the local maven repo
  // For > 0.71, this will be replaced by `com.facebook.react:react-android:$version` by react gradle plugin
  //noinspection GradleDynamicVersion
  implementation "com.facebook.react:react-native:+"
  implementation 'androidx.appcompat:appcompat:1.6.0'
  implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
      // For Accura OCR SDK
  implementation 'com.github.accurascan:AccuraOCR:7.0.3'
  implementation 'com.squareup.picasso:picasso:2.71828'

}

if (isNewArchitectureEnabled()) {
  react {
    jsRootDir = file("../src/")
    libraryName = "AccurascanMICR"
    codegenJavaPackageName = "com.accurascanmicr"
  }
}
